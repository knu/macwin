name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install SwiftLint
        run: |
          set -euo pipefail
          brew install swiftlint

      - name: Run SwiftLint
        run: |
          set -euo pipefail
          swiftlint

      - name: Test
        run: |
          set -euo pipefail
          swift test

      - name: Build
        run: |
          set -euo pipefail
          swift build
