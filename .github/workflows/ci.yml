name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install SwiftLint
        run: |
          set -euo pipefail
          brew install swiftlint

      - name: Run SwiftLint
        run: |
          set -euo pipefail
          swiftlint

  build:
    name: Build
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build
        run: |
          set -euo pipefail
          swift build
