name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install SwiftLint
        run: |
          set -euo pipefail
          brew install swiftlint

      - name: Run SwiftLint
        run: |
          set -euo pipefail
          swiftlint

      - name: Test
        run: |
          set -euo pipefail
          swift test

      - name: Build
        run: |
          set -euo pipefail
          swift build
