<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="0.5" stop-color="#ef4444"/>
      <stop offset="1" stop-color="#7f1d1d"/>
    </linearGradient>
    <linearGradient id="win" x1="160" y1="200" x2="864" y2="824" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fffbeb"/>
      <stop offset="1" stop-color="#fed7aa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#450a0a" flood-opacity="0.45"/>
    </filter>
    <clipPath id="lensClip">
      <circle cx="640" cy="620" r="158"/>
    </clipPath>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <g filter="url(#shadow)" opacity="0.9">
    <rect x="100" y="296" width="704" height="540" rx="56" fill="#7f1d1d"/>
    <rect x="130" y="326" width="644" height="480" rx="34" fill="url(#win)"/>
    <path d="M130 358c0-18 14-32 32-32h580c18 0 32 14 32 32v76H130Z" fill="#7f1d1d"/>
    <circle cx="176" cy="364" r="16" fill="#fb7185"/>
    <circle cx="220" cy="364" r="16" fill="#facc15"/>
    <circle cx="264" cy="364" r="16" fill="#34d399"/>
  </g>

  <g filter="url(#shadow)" opacity="0.95">
    <rect x="220" y="252" width="704" height="540" rx="56" fill="#7f1d1d"/>
    <rect x="250" y="282" width="644" height="480" rx="34" fill="url(#win)"/>
    <path d="M250 314c0-18 14-32 32-32h580c18 0 32 14 32 32v76H250Z" fill="#7f1d1d"/>
    <circle cx="296" cy="320" r="16" fill="#fb7185"/>
    <circle cx="340" cy="320" r="16" fill="#facc15"/>
    <circle cx="384" cy="320" r="16" fill="#34d399"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="160" y="200" width="704" height="540" rx="56" fill="#7f1d1d"/>
    <rect x="190" y="230" width="644" height="480" rx="34" fill="url(#win)"/>
    <path d="M190 262c0-18 14-32 32-32h580c18 0 32 14 32 32v76H190Z" fill="#7f1d1d"/>
    <circle cx="236" cy="268" r="16" fill="#fb7185"/>
    <circle cx="280" cy="268" r="16" fill="#facc15"/>
    <circle cx="324" cy="268" r="16" fill="#34d399"/>
    <text x="512" y="286" text-anchor="middle" font-family="Helvetica, Arial, sans-serif"
          font-weight="700" font-size="48" fill="#fed7aa" opacity="0.75">Document</text>

    <g font-family="Helvetica, Arial, sans-serif" font-weight="700" fill="#7f1d1d">
      <text x="226" y="424" font-size="48">The quick brown</text>
      <text x="226" y="498" font-size="48">fox jumps over</text>
      <text x="226" y="572" font-size="48">the lazy dog.</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <g transform="translate(640 620) rotate(45)">
      <rect x="140" y="-40" width="244" height="80" rx="28" fill="#450a0a"/>
    </g>

    <circle cx="640" cy="620" r="186" fill="#450a0a"/>

    <g clip-path="url(#lensClip)">
      <rect x="482" y="462" width="316" height="316" fill="#fffbeb"/>
      <g font-family="Helvetica, Arial, sans-serif" font-weight="800" fill="#7f1d1d">
        <text x="640" y="594" text-anchor="middle" font-size="92">quick</text>
        <text x="640" y="722" text-anchor="middle" font-size="92">jumps</text>
      </g>
      <rect x="522" y="516" width="236" height="92" fill="none"
            stroke="#16a34a" stroke-width="6" stroke-dasharray="14 8"/>
      <rect x="510" y="644" width="260" height="92" fill="none"
            stroke="#16a34a" stroke-width="6" stroke-dasharray="14 8"/>
    </g>

    <circle cx="640" cy="620" r="172" fill="none" stroke="#7f1d1d" stroke-width="28"/>
    <path d="M538 542c22-28 70-44 116-22" fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" opacity="0.75"/>
  </g>
